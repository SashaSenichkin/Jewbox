name: Deploy to GitHub Pages

# Запускаем магию только на пуши в main
on:
  push:
    branches: [ master ]

    
jobs:
  deploy-to-github-pages:
    runs-on: ubuntu-latest
    steps:
      # клонируем репозиторий на виртуальную машину
    - uses: actions/checkout@v2
    
      # ставим нужный SDK (можно использовать и более старые)
    - name: Setup .NET 9
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: '9.0.x'
        include-prerelease: true
        
      # генерируем статические файлы
    - name: Publish .NET Core Project
      run: dotnet publish src/Jewbox.csproj -c Release --output release --nologo
      
    - name: Change base-tag in index.html from / to BlazorGitHubPagesDemo
      run: sed -i 's/<base href="\/" \/>/<base href="\/Jewbox\/" \/>/g' release/wwwroot/index.html  
    
    - name: Add .nojekyll file
      run: touch release/wwwroot/.nojekyll      
      
    - name: Uploading files to gh-pages branch
      uses: JamesIves/github-pages-deploy-action@v4.6.1
      with:
        branch: gh-pages
        ssh-key: ${{ secrets.DEPLOY_KEY }}
        folder: release/wwwroot
        
